<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 976 676" width="976" height="676" font-family="Helvetica, Arial, sans-serif" data-uf-id="vyheOXgOIjZ81jv87gnA">
  <title>Daily cash reporting workflow</title>
  <desc>The daily cash review loop: pick the business date, read the DCAR with its screen-only Balanced/Difference badge, step through each appendix tab to confirm its "Ties to DCAR · Agrees" check, then print the set. Actual amounts and manual adjustments remain handwritten on the printed sheet, and the weekly spreadsheet entry stays a deliberate manual control point.</desc>
  <rect x="0" y="0" width="976" height="676" fill="#fbfaf7"/>
  <!-- step 1 -->
  <rect x="48" y="60" width="264" height="120" rx="10" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="180" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">1 · Pick the business date</text>
  <rect x="88" y="104" width="184" height="30" rx="6" fill="none" stroke="#999"/>
  <text x="180" y="124" text-anchor="middle" font-size="11" fill="#666">Date  2025-12-23</text>
  <text x="180" y="160" text-anchor="middle" font-size="10" fill="#888">from Lookup → Daily Cash</text>
  <path d="M312 120 L356 120" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <!-- step 2 -->
  <rect x="356" y="60" width="264" height="120" rx="10" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="488" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">2 · Review the DCAR</text>
  <rect x="396" y="104" width="110" height="26" rx="13" fill="#e8f4ea" stroke="#3a7d44"/>
  <text x="451" y="121" text-anchor="middle" font-size="10" fill="#2a5d33">Balanced &#10003;</text>
  <rect x="516" y="104" width="80" height="26" rx="13" fill="#fdf3dd" stroke="#b98a2f"/>
  <text x="556" y="121" text-anchor="middle" font-size="10" fill="#8a6620">Diff $8.00</text>
  <text x="488" y="160" text-anchor="middle" font-size="10" fill="#888">upper section must equal receipts</text>
  <path d="M620 120 L664 120" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <!-- step 3 -->
  <rect x="664" y="60" width="264" height="120" rx="10" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="796" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">3 · Walk the appendix tabs</text>
  <text x="796" y="112" text-anchor="middle" font-size="10" fill="#333">Deposits received / applied ·</text>
  <text x="796" y="128" text-anchor="middle" font-size="10" fill="#333">Cashier detail · Items cashed out</text>
  <text x="796" y="152" text-anchor="middle" font-size="10" fill="#2a5d33">each shows "Ties to DCAR · &#10003; Agrees"</text>
  <!-- step 4 -->
  <path d="M796 180 L796 224" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="664" y="224" width="264" height="110" rx="10" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="796" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">4 · Print the set</text>
  <text x="796" y="276" text-anchor="middle" font-size="10" fill="#333">each sheet matches the lodge's</text>
  <text x="796" y="292" text-anchor="middle" font-size="10" fill="#333">established printed format exactly</text>
  <text x="796" y="316" text-anchor="middle" font-size="10" fill="#888">badges never print</text>
  <!-- step 5 manual -->
  <path d="M664 279 L356 279 L356 250" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="224" y="224" width="264" height="110" rx="10" fill="#fffdf5" stroke="#b98a2f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="356" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a6620">5 · Handwritten reconciliation</text>
  <text x="356" y="276" text-anchor="middle" font-size="10" fill="#8a6620">actual amounts + adjustments filled in</text>
  <text x="356" y="292" text-anchor="middle" font-size="10" fill="#8a6620">by hand; weekly spreadsheet entry</text>
  <text x="356" y="308" text-anchor="middle" font-size="10" fill="#8a6620">stays a deliberate manual control</text>
  <text x="488" y="420" text-anchor="middle" font-size="11" fill="#888">The screen aids catch imbalances early; the paper workflow the lodge trusts is unchanged.</text>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
