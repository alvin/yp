<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 976 676" width="976" height="676" font-family="Helvetica, Arial, sans-serif" data-uf-id="lO0F2iDY3DPaPQDx2eRL">
  <title>DCAR/appendices details viewer</title>
  <desc>The daily cash workspace: the DCAR and its four appendices (Deposits Received, Deposits Applied, Cashier Detail, Items Cashed Out) plus the Notes document sit on one tab row sharing a single business date, so reviewers move between the report and its supporting detail without leaving the workflow. Each view is the exact printed sheet.</desc>
  <rect x="0" y="0" width="976" height="676" fill="#fbfaf7"/>
  <rect x="24" y="24" width="928" height="46" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="44" y="53" font-size="13" fill="#333">&#8592; Lookup</text>
  <text x="150" y="53" font-size="13" font-weight="bold" fill="#111">Daily Cash Activity Report</text>
  <rect x="620" y="33" width="120" height="28" rx="6" fill="none" stroke="#999"/>
  <text x="680" y="52" text-anchor="middle" font-size="11" fill="#666">Date 2025-12-23</text>
  <rect x="756" y="33" width="110" height="28" rx="14" fill="#e8f4ea" stroke="#3a7d44"/>
  <text x="811" y="52" text-anchor="middle" font-size="11" fill="#2a5d33">Balanced &#10003;</text>
  <rect x="880" y="33" width="52" height="28" rx="6" fill="#333"/>
  <text x="906" y="52" text-anchor="middle" font-size="11" fill="#fff">Print</text>
  <!-- tabs -->
  <g font-size="12">
    <text x="44" y="98" fill="#111" font-weight="bold">Daily Cash Report</text>
    <rect x="42" y="104" width="112" height="3" fill="#333"/>
    <text x="180" y="98" fill="#888">Deposits received</text>
    <text x="310" y="98" fill="#888">Deposits applied</text>
    <text x="432" y="98" fill="#888">Cashier detail</text>
    <text x="538" y="98" fill="#888">Items cashed out</text>
    <text x="662" y="98" fill="#888">Notes</text>
  </g>
  <!-- printed DCAR -->
  <rect x="72" y="126" width="832" height="510" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <rect x="112" y="146" width="752" height="24" fill="#111"/>
  <text x="488" y="163" text-anchor="middle" font-size="12" fill="#fff" letter-spacing="3">YELLOW POINT LODGE</text>
  <text x="488" y="196" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Daily Cash Activity Report for December 23, 2025</text>
  <text x="120" y="224" font-size="10" fill="#666">Item:                                    Amount (Cdn):        Adjustments:</text>
  <line x1="112" y1="230" x2="864" y2="230" stroke="#999"/>
  <text x="120" y="248" font-size="10" fill="#333">Room … Liquor … every revenue line, then Total Sales and Charges:</text>
  <text x="120" y="266" font-size="10" fill="#333">GST: … Total Taxes: … then every deposit/prepayment adjustment line</text>
  <text x="120" y="284" font-size="10" fill="#333">Today's Revenue and Expenses:            $1,649.43</text>
  <text x="120" y="316" font-size="11" font-weight="bold" fill="#111">Type of Cash:</text>
  <rect x="210" y="304" width="180" height="16" fill="#111"/>
  <text x="300" y="316" text-anchor="middle" font-size="9" fill="#fff">All US amounts converted to Cdn</text>
  <text x="120" y="340" font-size="10" fill="#666">Type of Cash:      Calc. Amt (Cdn):     Actual Amount:     Adjustments:</text>
  <line x1="112" y1="346" x2="864" y2="346" stroke="#999"/>
  <text x="120" y="364" font-size="10" fill="#333">Every tender, including $0.00 rows · Actual/Adjustments stay blank for handwriting</text>
  <text x="120" y="388" font-size="10" fill="#333">Total Receipts Today:   $1,649.43        Balance Owed:  $0.00</text>
  <text x="488" y="660" text-anchor="middle" font-size="11" fill="#888">Switching tabs keeps the same business date; each appendix shows its own "Ties to DCAR · Agrees" check.</text>
</svg>
