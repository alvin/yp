<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 976 676" width="976" height="676" font-family="Helvetica, Arial, sans-serif">
  <title>Batch print run</title>
  <desc>The one-click daily print run: from the Print Centre, "Batch print for tomorrow" opens a composite page holding the four daily operational reports plus every queued confirmation, folio, and bill — each on its own sheet — with a ready-count summary and a single Print action.</desc>
  <rect x="0" y="0" width="976" height="676" fill="#fbfaf7"/>
  <!-- toolbar -->
  <rect x="24" y="24" width="928" height="52" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="44" y="56" font-size="14" fill="#333">&#8592; Back</text>
  <text x="120" y="56" font-size="14" font-weight="bold" fill="#111">Batch print · Jul 6, 2026</text>
  <text x="360" y="56" font-size="12" fill="#666">11 pages ready: 4 reports · 5 confirmations · 2 folios</text>
  <rect x="700" y="34" width="120" height="32" rx="6" fill="none" stroke="#999"/>
  <text x="712" y="55" font-size="12" fill="#666">Date  2026-07-06</text>
  <rect x="836" y="34" width="96" height="32" rx="6" fill="#333"/>
  <text x="884" y="55" text-anchor="middle" font-size="13" fill="#fff">Print</text>
  <!-- page 1: report -->
  <text x="72" y="112" font-size="11" fill="#888">Housekeeping Report</text>
  <rect x="72" y="120" width="832" height="150" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <rect x="112" y="134" width="752" height="22" fill="#111"/>
  <text x="488" y="150" text-anchor="middle" font-size="12" fill="#fff" letter-spacing="3">YELLOW POINT LODGE</text>
  <line x1="112" y1="176" x2="864" y2="176" stroke="#999"/>
  <line x1="112" y1="196" x2="864" y2="196" stroke="#ddd"/>
  <line x1="112" y1="216" x2="864" y2="216" stroke="#ddd"/>
  <line x1="112" y1="236" x2="864" y2="236" stroke="#ddd"/>
  <!-- page break -->
  <line x1="72" y1="292" x2="904" y2="292" stroke="#999" stroke-dasharray="8 6"/>
  <text x="488" y="286" text-anchor="middle" font-size="10" fill="#aaa">page break — each document prints on its own sheet</text>
  <!-- page 2: slip -->
  <text x="72" y="320" font-size="11" fill="#888">Confirmation #115732 — PRATT, WENDY</text>
  <rect x="72" y="328" width="832" height="150" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <text x="488" y="366" text-anchor="middle" font-size="18" font-style="italic" fill="#111">Yellow Point Lodge</text>
  <line x1="130" y1="388" x2="480" y2="388" stroke="#ddd"/>
  <line x1="130" y1="404" x2="440" y2="404" stroke="#ddd"/>
  <line x1="620" y1="388" x2="846" y2="388" stroke="#ddd"/>
  <line x1="620" y1="404" x2="846" y2="404" stroke="#ddd"/>
  <line x1="130" y1="440" x2="846" y2="440" stroke="#999"/>
  <!-- page break -->
  <line x1="72" y1="500" x2="904" y2="500" stroke="#999" stroke-dasharray="8 6"/>
  <!-- page 3 hint -->
  <text x="72" y="528" font-size="11" fill="#888">Check-in folio #115738 — …</text>
  <rect x="72" y="536" width="832" height="80" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <text x="488" y="580" text-anchor="middle" font-size="12" fill="#bbb">… every queued document follows …</text>
  <text x="488" y="652" text-anchor="middle" font-size="11" fill="#888">A document that fails to load is skipped; the rest of the run still prints.</text>
</svg>
