<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 976 676" width="976" height="676" font-family="Helvetica, Arial, sans-serif" data-uf-id="NialUNVNp47pohlCpdUP">
  <title>DCAR appendix reconciliation</title>
  <desc>How each appendix ties back to the Daily Cash Activity Report: appendix totals (deposits by payment type, cashier detail tender subtotals, items cashed out tax breakdown) are built automatically from the day's rows, and each appendix carries a screen-only "Ties to DCAR line · Agrees" check against the matching DCAR line for the selected day.</desc>
  <rect x="0" y="0" width="976" height="676" fill="#fbfaf7"/>
  <!-- workspace chrome -->
  <rect x="24" y="24" width="928" height="46" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="44" y="53" font-size="13" fill="#333">&#8592; Daily Cash</text>
  <text x="160" y="53" font-size="13" font-weight="bold" fill="#111">Deposits Received</text>
  <rect x="560" y="33" width="180" height="28" rx="14" fill="#e8f4ea" stroke="#3a7d44"/>
  <text x="650" y="52" text-anchor="middle" font-size="11" fill="#2a5d33">Ties to DCAR line · &#10003; Agrees</text>
  <rect x="756" y="33" width="100" height="28" rx="6" fill="none" stroke="#999"/>
  <text x="806" y="52" text-anchor="middle" font-size="11" fill="#666">Date</text>
  <rect x="868" y="33" width="64" height="28" rx="6" fill="#333"/>
  <text x="900" y="52" text-anchor="middle" font-size="12" fill="#fff">Print</text>
  <!-- tab row -->
  <text x="44" y="96" font-size="12" fill="#111" font-weight="bold" text-decoration="underline">Deposits received</text>
  <text x="180" y="96" font-size="12" fill="#888">Deposits applied</text>
  <text x="300" y="96" font-size="12" fill="#888">Cashier detail</text>
  <text x="410" y="96" font-size="12" fill="#888">Items cashed out</text>
  <text x="540" y="96" font-size="12" fill="#888">Notes</text>
  <!-- printed sheet with automatic grouping/totals -->
  <rect x="72" y="120" width="832" height="500" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <rect x="112" y="140" width="752" height="24" fill="#111"/>
  <text x="488" y="157" text-anchor="middle" font-size="12" fill="#fff" letter-spacing="3">YELLOW POINT LODGE</text>
  <text x="488" y="192" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">Deposits Received</text>
  <text x="488" y="210" text-anchor="middle" font-size="11" fill="#333">for 23-Dec-25, by Payment Type</text>
  <line x1="112" y1="236" x2="864" y2="236" stroke="#999"/>
  <text x="120" y="252" font-size="10" fill="#666">Payment Type   Res #   Last Name   First Name   Pymt Amt   Funds   Pymt CDN</text>
  <line x1="112" y1="276" x2="864" y2="276" stroke="#eee"/>
  <text x="120" y="272" font-size="10" fill="#333">Cash · rows grouped by tender, amounts from the day's payments</text>
  <line x1="112" y1="300" x2="864" y2="300" stroke="#eee"/>
  <text x="120" y="296" font-size="10" fill="#333">Visa · …</text>
  <line x1="112" y1="330" x2="864" y2="330" stroke="#999"/>
  <text x="770" y="352" font-size="11" font-weight="bold" fill="#111">Total Deposits Received:  $455.00</text>
  <text x="120" y="420" font-size="10" fill="#888">Cashier Detail adds a "&lt;Tender&gt; Subtotal" row per payment type;</text>
  <text x="120" y="436" font-size="10" fill="#888">Items Cashed Out subtotals every tax column per inventory code</text>
  <text x="120" y="452" font-size="10" fill="#888">and ends with a Report Totals row. All totals build automatically</text>
  <text x="120" y="468" font-size="10" fill="#888">from the day's rows — nothing is queued or rebuilt by hand.</text>
  <text x="488" y="650" text-anchor="middle" font-size="11" fill="#888">The green check compares this appendix total to its DCAR line and flags any difference.</text>
</svg>
